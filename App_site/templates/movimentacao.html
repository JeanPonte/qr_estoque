<!DOCTYPE html>
<html>
  <head>
    <title>Movimentações</title>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <body>
  <!-- Cabeçalho -->
    {% set titulo = "Movimentação" %}
    {% set botoes %}
      <a href="{{ url_for('homepage') }}" class="btn btn-primary ms-2">Voltar</a>
    {% endset %}

    {% include "partials/header.html" %}

    <div class="container text-center p-5">
      <h4 class="mb-3 text-primary">Leitura de QR Code</h4>

      <input
        type="text"
        id="qrInput"
        class="form-control form-control-lg"
        placeholder="Aponte o leitor para o QR Code"
        autofocus
        onkeydown="lerQRCode(event)"
      >

      <div class="p-3" id="Observacao">
        <p>Observação: Para lançar manualmente, digite o codigo QR unico e aperte ENTER</p>
      </div>

      <div id="resposta"></div>

      <a href="{{ url_for('homepage') }}" class="btn btn-secondary mt-4">Voltar à Home 🏠</a>
    </div> 

    <script>
      function processar_dado(qr, id_unico) {
      const resposta = document.getElementById("resposta");

      resposta.innerText = "Processando...";
      resposta.className = "text-warning";

      fetch(`/movimentacao/${qr}/${id_unico}`)
        .then(r => r.text())
        .then(data => {
          resposta.innerText = data;
          resposta.className = "text-success";
        })
        .catch(err => {
          resposta.innerText = "Erro na requisição";
          resposta.className = "text-danger";
          console.error(err);
        });
    }

    function lerQRCode(event) {
      if (event.key !== "Enter") return;

      const input = document.getElementById("qrInput");
      const resposta = document.getElementById("resposta");
      const valor = input.value.trim();

      if (!valor.includes("/")) {
        resposta.innerText = "QR Code inválido";
        resposta.className = "text-danger";
        input.value = "";
        return;
      }

      const [qr, id_unico] = valor.split("/");

      if (!qr || !id_unico) {
        resposta.innerText = "QR Code inválido";
        resposta.className = "text-danger";
        input.value = "";
        return;
      }

      processar_dado(qr, id_unico);
      input.value = "";
    }

    </script>
  </body>
</html>
