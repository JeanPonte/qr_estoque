<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    {% set titulo = "Emisão de etiqueta" %}
    {% set botoes %}
      <a href="{{ url_for('homepage') }}" class="btn btn-primary ms-2">Voltar</a>
    {% endset %}

    {% include "partials/header.html" %}

    <input 
      type="text" 
      id="qr_input" 
      class="form-control form-control-lg"
      placeholder="QR Code unico para impressão"
      >
      <button class="btn btn-primary" onclick="abrir()">Imprimir etiqueta 🖨</button>
    <script>
      function abrir() {
      fetch('/abrir_exe', { method: 'POST' })
          .then(r => r.json())
          .then(d => {
              alert(d.status);
              window.close();
          });
      }
        const params = new URLSearchParams(window.location.search);
        const qr = params.get('qr');
        

        if (qr) {
            document.getElementById('qr_input').value = qr;
        }
    </script>
  </body>
</html>
