<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Dashboard Tabelas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  
</head>

<body class="bg-light">

{% set titulo = "Dashboard" %}
  {% set botoes %}
    <a href="{{ url_for('homepage') }}" class="btn btn-primary ms-2">Voltar</a>
  {% endset %}

  {% include "partials/header.html" %}

  <!-- CONTROLES -->
  <div class="row mt-3">
    <div class="col-md-6">
      <select id="tabelaSelect" class="form-select"
              onchange="carregarTabela(this.value)">
        <option selected disabled>Selecione uma tabela</option>
        {% for tabela in tabelas %}
        <option value="{{ tabela }}">{{ tabela }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-auto">
      <button class="btn btn-primary" onclick="atualizarTabela()">
        Atualizar
      </button>
    </div>

    <div class="col-md-4">
      <input type="text" id="campoBusca" class="form-control"
             placeholder="Buscar na tabela..." autocomplete="off">
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="row mt-3">
    <div class="col">
      <div class="card shadow-sm">
        <div class="card-body">

          <div id="tabelaResultado">
            <p class="text-muted m-0">Selecione uma tabela para visualizar.</p>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- RODAPÉ / AÇÕES -->
  <div class="row mt-3 mb-4">
    <div class="col">
      <a href="{{ url_for('homepage') }}" class="btn btn-secondary btn-sm">
        Voltar à Home
      </a>
    </div>
  </div>

</div>
  
<script>
  var tab_use = '';
  var carregando = false; // Evita chamadas simultâneas

  function carregarTabela(tabela) {
    if (carregando) return; // Já tem requisição em andamento

    carregando = true;
    const tabelaResultado = document.getElementById('tabelaResultado');
    tabelaResultado.innerHTML = '<p>Carregando...</p>';

    fetch(`/carregar_tabela/${tabela}`)
      .then(response => {
        if (!response.ok) throw new Error('Erro ao carregar tabela');
        return response.text();
      })
      .then(html => {
        tab_use = tabela;
        tabelaResultado.innerHTML = html;
      })
      .catch(() => {
        tabelaResultado.innerHTML =
          '<p class="text-danger">Erro ao carregar os dados.</p>';
      })
      .finally(() => {
        carregando = false;
      });
  }

  function atualizarTabela() {
    if (!tab_use) {
      alert("Selecione uma tabela primeiro.");
      return;
    }
    carregarTabela(tab_use);
  }

  // Função para mudar qrcode do input_qr 
  // e além disso abre uma nova aba para impressão da etiqueta contendo esse qr
  function mudarQrcode(id, qr) {
    fetch(`/mudar_qrcode/${id}/${qr}`)
      .then(response => response.text())
      .then(novoQr => {
        if (confirm("Deseja selecionar esse produto?")) {
          window.open(`/etiqueta?qr=${encodeURIComponent(novoQr)}`, "_blank").focus(); //Nova Aba
        }
      })
      .catch(() => alert("Erro ao mudar QR Code"));
  }

  // Evento ao clicar na linha (apenas tabela produtos)
  document.addEventListener('click', function (e) {

  if (tab_use !== "produtos") return;

  const row = e.target.closest('.data tbody tr');
  console.log(row)
  if (!row) return;
  
  const id = row.dataset.id;
  const qrcode = row.dataset.qr;
  if (!id || !qrcode) return;

  mudarQrcode(id, qrcode);
});

  // AUTO ATUALIZAÇÃO A CADA 30s 
  // setInterval(() => {
  //   if (tab_use && !document.hidden && !carregando) {
  //     carregarTabela(tab_use);
  //   }
  // }, 30000);

  const campoBusca = document.getElementById("campoBusca");

  if (campoBusca) {
    campoBusca.addEventListener("input", function () {

      if (!tab_use) return;

      const termo = this.value;

      fetch(`/buscar_tabela/${tab_use}?termo=` + encodeURIComponent(termo))
        .then(resp => {
          if (!resp.ok) throw new Error();
          return resp.text();
        })
        .then(html => {
          document.getElementById("tabelaResultado").innerHTML = html;
        })
        .catch(() => {
          console.log("Erro na busca");
        });
    });
  }
  
</script>


</body>

</html>
