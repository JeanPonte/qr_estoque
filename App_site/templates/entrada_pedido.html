<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de pedido</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  {% set titulo = "Cadastro de pedido" %}
  {% set botoes %}
    <a href="{{ url_for('homepage') }}" class="btn btn-primary">Voltar</a>
  {% endset %}

  {% include "partials/header.html" %}

  <div class="content text-center p-5">

    <div class="mx-auto" style="max-width:1000px">

      <div class="mb-3 text-start">
        <label for="qrInput" class="form-label">QR Code:</label>
        <input type="text" class="form-control" id="qrInput" 
          placeholder="Data_pedido|Entrega|NºPedido|Produzir|Qtd|Comprimento|Cliente"
          autofocus>
          
      </div>

      <div class="mb-3 text-start">
        <label for="volumeEditado" class="form-label">Volume:</label>
        <input type="number" class="form-control" id="volumeEditado" placeholder="Digite o volume">
      </div>

      <div class="form-check mb-2 text-start">
        <input class="form-check-input" type="checkbox" id="alterarQtd" onchange="toggleQuantidade()">
        <label class="form-check-label" for="alterarQtd">
          Quantidade diferente do pedido
        </label>
      </div>

      <div class="mb-3 text-start">
        <label for="quantidadeEditado" class="form-label">Quantidade:</label>
        <input type="number" class="form-control" id="quantidadeEditado"
          placeholder="Digite a quantidade (Confira o pedido)" disabled>
      </div>

      <div class="mb-3 text-start">
        <label for="quem_lancou" class="form-label">Quem lançou:</label>
        <select class="form-select" id="quem_lancou">
          <option value="">Carregando...</option>
        </select>
      </div>

      <div class="mb-3 text-start">
        <label for="statusPedido" class="form-label">Status:</label>
        <select class="form-select" id="statusPedido">
          <option value="Em produção">Em produção</option>
          <option value="Concluído">Concluído</option>
          <option value="Entregue">Entregue</option>
        </select>
      </div>

      <button class="btn btn-primary w-100" onclick="registrar()">Registrar</button>

      <div id="resposta" class="mt-3"></div>

    </div>

  </div>

<script>

function carregarNomes() {

  fetch("/obter-nomes")
  .then(res => res.json())
  .then(nomes => {

    const select = document.getElementById("quem_lancou");
    select.innerHTML = '<option value="">Selecione</option>';

    nomes.forEach(function(nome) {

      const option = document.createElement("option");
      option.value = nome;
      option.text = nome;

      select.appendChild(option);

    });

  });

}

carregarNomes();

function toggleQuantidade() {
  const checkbox = document.getElementById("alterarQtd");
  const campoQtd = document.getElementById("quantidadeEditado");

  campoQtd.disabled = !checkbox.checked;

  if (!checkbox.checked) {
    campoQtd.value = "";
  }
}

function registrar() {

  const qr = document.getElementById("qrInput").value.trim();
  const volume = document.getElementById("volumeEditado").value.trim();
  const quem = document.getElementById("quem_lancou").value;
  const alterarQtd = document.getElementById("alterarQtd").checked;
  const quantidade = alterarQtd ? document.getElementById("quantidadeEditado").value.trim() : "";
  const status = document.getElementById("statusPedido").value;

  const resposta = document.getElementById("resposta");

  if (!qr) {
    resposta.innerText = "Informe os dados do QR Code.";
    resposta.className = "text-danger mt-3";
    return;
  }
  
  if (!volume) {
    resposta.innerText = "Informe o volume.";
    resposta.className = "text-danger mt-3";
    return;
  }

  resposta.innerText = "Processando...";
  resposta.className = "text-warning mt-3";

  fetch("/registrar-pedido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      qr: qr,
      volume: volume,
      quem: quem,
      quantidade: quantidade,
      status: status
    })
  })
  .then(data => {

    resposta.innerText = data.msg;
    resposta.className = "text-success mt-3";

    document.getElementById("qrInput").value = "";
    document.getElementById("volumeEditado").value = "";
    document.getElementById("quem_lancou").value = "";
    document.getElementById("alterarQtd").checked = false;

    const qtd = document.getElementById("quantidadeEditado");
    qtd.value = "";
    qtd.disabled = true;

    document.getElementById("statusPedido").value = "Em produção";
    document.getElementById("qrInput").focus();

});
}

</script>

</body>
</html>
